services:
  # Django Backend
  - type: web
    name: grocery-bud-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn grocery_project.wsgi:application"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: grocery-bud-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://grocery-bud-frontend.onrender.com

  # React Frontend
  - type: web
    name: grocery-bud-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://grocery-bud-backend.onrender.com/api/grocery

databases:
  - name: grocery-bud-db
    plan: free
